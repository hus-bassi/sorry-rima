<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>💖 Sorry Rima</title>

    <meta name="description"
        content="A beautiful interactive apology made with love.">

    <meta name="theme-color" content="#ff5ba7">

    <!-- Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Background -->

    <canvas id="bgCanvas"></canvas>

    <canvas id="particlesCanvas"></canvas>

    <!-- Music -->

    <audio id="music" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Button -->

    <button id="musicBtn" class="music-btn">

        🔊

    </button>

    <!-- ================= Intro ================= -->

    <section id="intro" class="scene active">

        <div class="glass">

            <h1>

                أهلاً بيكي يا ريما سلطان ❤️

            </h1>

            <p id="introText"></p>

            <button id="startBtn">

                ابدأ ✨

            </button>

        </div>

    </section>

    <!-- ================= Main ================= -->

    <section id="main" class="scene">

        <div class="questionBox">

            <h2>

                سامحتيني؟ 🥺

            </h2>

            <div class="buttons">

                <button id="yesBtn">

                    سامحتك ❤️

                </button>

                <button id="noBtn">

                    لا 😒

                </button>

            </div>

        </div>

    </section>

    <!-- ================= Door ================= -->

    <section id="doorScene" class="scene">

        <div class="door">

            🚪

        </div>

        <h2>

            عالم جديد بانتظارنا...

        </h2>

    </section>

    <!-- ================= World ================= -->

    <section id="world" class="scene">

        <div id="sun"></div>

        <div id="road"></div>

        <div id="character">

            🧍🏻‍♂️

        </div>

        <div id="dialogueBox">

            <p id="dialogue"></p>

        </div>

        <button id="hugBtn">

            🤍 حضن

        </button>

    </section>

    <!-- ================= Ending ================= -->

    <section id="ending" class="scene">

        <div class="glass">

            <h1>

                بحبك جدًا ❤️

            </h1>

            <p>

                شكراً إنك سامحتيني 🌹

            </p>

        </div>

    </section>

    <!-- JS -->

    <script src="script.js"></script>

</body>

</html>
